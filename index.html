<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🎲 Múltiple herramienta v4.0 - Multi API</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
    font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .main-container { 
    max-width: 950px; 
    width: 100%; 
    margin: 0 auto;
    flex: 1;
  }
  
  .header {
    background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 20px;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .header h1 { font-size: 1.8rem; color: #ffd966; }
  .header h3 { color: #87ceeb; font-size: 0.9rem; margin-top: 5px; }
  .version { background: rgba(0,0,0,0.3); display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 0.7rem; color: #ffd966; margin-top: 10px; }

  .tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .tab-btn {
    flex: 1;
    min-width: 120px;
    padding: 12px;
    background: #0f1722;
    border: none;
    border-radius: 12px;
    color: #87ceeb;
    cursor: pointer;
    font-weight: bold;
    transition: all 0.3s;
  }
  .tab-btn.active {
    background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
    color: white;
  }
  .tab-content { display: none; }
  .tab-content.active { display: block; }

  .box {
    background: linear-gradient(135deg, #1e2a3a 0%, #0f1722 100%);
    border-radius: 20px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border: 1px solid rgba(255,255,255,0.1);
  }

  label {
    display: block;
    margin-top: 1rem;
    margin-bottom: 0.5rem;
    font-weight: 600;
    font-size: 0.85rem;
    color: #87ceeb;
  }

  input, select, button {
    width: 100%;
    padding: 0.8rem 1rem;
    border-radius: 12px;
    border: 1px solid #2c3e50;
    font-size: 0.9rem;
    font-family: inherit;
    background: #0f1722;
    color: #e2e8f0;
  }

  button {
    background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
    color: white;
    font-weight: bold;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
  }
  button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
  button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .menu-botones {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 8px;
    margin-bottom: 20px;
    position: relative;
  }
  .menu-botones button {
    background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
    font-size: 0.7rem;
    padding: 10px 5px;
    white-space: normal;
    word-break: break-word;
  }
  .menu-botones button.active {
    background: linear-gradient(135deg, #ff6b6b 0%, #ee5a24 100%);
  }

  .ejemplo-tooltip {
    position: absolute;
    background: linear-gradient(135deg, #ffd966 0%, #ffb347 100%);
    color: #1a1a2e;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: bold;
    white-space: nowrap;
    z-index: 1000;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    animation: fadeInUp 0.3s ease;
    pointer-events: none;
  }
  
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .panel-combos {
    display: none;
    padding: 15px;
    background: rgba(15, 23, 34, 0.8);
    border-radius: 15px;
    margin-top: 15px;
  }
  .panel-combos.active { display: block; }

  .fila-opcion {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 12px;
    align-items: center;
  }
  .fila-opcion label {
    margin: 0;
    min-width: 140px;
    font-size: 0.75rem;
  }
  .fila-opcion input, .fila-opcion select {
    flex: 1;
    min-width: 120px;
    padding: 8px 10px;
    font-size: 0.75rem;
  }
  .fila-opcion button { flex: 0.4; min-width: 100px; padding: 8px; }

  .resultado-gen {
    background: rgba(0,0,0,0.7);
    border-radius: 12px;
    padding: 15px;
    max-height: 150px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 13px;
    margin-top: 15px;
    display: none;
    border: 1px solid #ffd966;
    color: #ffd966;
  }
  .resultado-gen.visible { display: block; }

  .progress-container {
    background: #0f1722;
    border-radius: 30px;
    padding: 15px;
    margin-top: 20px;
    display: none;
  }
  .progress-container.visible { display: block; }
  .progress-bar {
    width: 100%;
    height: 12px;
    background: #2c3e50;
    border-radius: 10px;
    overflow: hidden;
    margin-top: 10px;
  }
  .progress-fill {
    width: 0%;
    height: 100%;
    background: linear-gradient(90deg, #00ff88, #ffd966);
    border-radius: 10px;
    transition: width 0.3s ease;
  }
  .progress-text {
    text-align: center;
    font-size: 0.9rem;
    font-weight: bold;
    color: #00ff88;
    margin-bottom: 5px;
  }
  .progress-stats {
    text-align: center;
    font-size: 0.75rem;
    color: #87ceeb;
    margin-top: 8px;
  }

  .file-list {
    background: rgba(0,0,0,0.3);
    border-radius: 12px;
    padding: 15px;
    margin-top: 15px;
    max-height: 200px;
    overflow-y: auto;
  }
  .file-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px;
    margin: 5px 0;
    background: rgba(255,255,255,0.05);

  .file-item input { width: auto; margin: 0; }
  .file-item label { margin: 0; flex: 1; cursor: pointer; color: #87ceeb; }

  .velocidad-control {

    align-items: center;
    gap: 15px;

    padding: 10px;
    background: rgba(0,0,0,0.3);

  .velocidad-control span { color: #00ff88; font-weight: bold; }

  .btn-descarga {

  /* Botón Grupos Iluminaty - centrado al final */

<script>
// ============= VARIABLES GLOBALES =============
let delayGeneracion = 5;
let ultimosCombosGenerados = [];
let ultimoResultadoUnion = null;
let ultimoResultadoDup = null;

// ============= CONTROL DE VELOCIDAD =============
const velocidadSlider = document.getElementById('velocidadSlider');
const velocidadValor = document.getElementById('velocidadValor');
velocidadSlider.addEventListener('input', () => {
  delayGeneracion = parseInt(velocidadSlider.value);
  velocidadValor.textContent = delayGeneracion + 'ms';
});

// ============= FUNCIÓN PARA MOSTRAR TOOLTIP =============
function mostrarEjemploSobreBoton(boton, ejemplo) {
  const tooltipExistente = document.querySelector('.ejemplo-tooltip');
  if (tooltipExistente) tooltipExistente.remove();
  
  const tooltip = document.createElement('div');
  tooltip.className = 'ejemplo-tooltip';
  tooltip.textContent = `✨ ${ejemplo} ✨`;
  
  const rect = boton.getBoundingClientRect();
  const menuRect = document.getElementById('menuBotones').getBoundingClientRect();
  
  tooltip.style.position = 'absolute';
  tooltip.style.left = (rect.left - menuRect.left) + 'px';
  tooltip.style.top = (rect.top - menuRect.top - 35) + 'px';
  
  document.getElementById('menuBotones').style.position = 'relative';
  document.getElementById('menuBotones').appendChild(tooltip);
  
  setTimeout(() => {
    if (tooltip && tooltip.remove) tooltip.remove();
  }, 2500);
}

// ============= FUNCIÓN PARA LIMPIAR NOMBRES =============
// Elimina acentos, caracteres no latinos, espacios y deja solo letras a-z
function limpiarNombre(texto) {
  if (!texto) return '';
  
  // Normalizar y eliminar acentos
  texto = texto.normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  
  // Eliminar caracteres no latinos (mantener solo a-z y A-Z)
  texto = texto.replace(/[^a-zA-Z]/g, '');
  
  // Eliminar espacios
  texto = texto.replace(/\s/g, '');
  
  // Si después de limpiar quedó vacío, usar nombre por defecto
  if (texto.length === 0) {
    const defaults = ['juan', 'pedro', 'carlos', 'luis', 'jose', 'angel', 'david', 'manuel'];
    texto = defaults[Math.floor(Math.random() * defaults.length)];
  }
  
  return texto;
}

// ============= FUNCIONES DE FORMATO =============
function aplicarFormato(texto, opcion) {
  if (!texto) return '';
  if (opcion === '1') return texto.toLowerCase();
  if (opcion === '2') return texto.charAt(0).toUpperCase() + texto.slice(1).toLowerCase();
  return Math.random() > 0.5 ? texto.toLowerCase() : texto.charAt(0).toUpperCase() + texto.slice(1).toLowerCase();
}

function randomAlphanumeric(length, tipo = 'letras', caseType = 'ambas') {
  let chars = '';
  if (tipo === 'letras') chars = 'abcdefghijklmnopqrstuvwxyz';
  else if (tipo === 'letras_numeros') chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
  
  if (caseType === 'mayusculas') chars = chars.toUpperCase();
  else if (caseType === 'minusculas') chars = chars.toLowerCase();
  
  if (!chars) chars = 'abcdefghijklmnopqrstuvwxyz';
  let result = '';
  for (let i = 0; i < length; i++) result += chars.charAt(Math.floor(Math.random() * chars.length));
  return result;
}

// ============= GENERADOR PRINCIPAL =============
async function generarCombos(tipo, cantidad, params, progressCallback) {
  const combosSet = new Set();
  const combosArray = [];
  let intentos = 0;
  const maxIntentos = cantidad * 2;
  
  while (combosSet.size < cantidad && intentos < maxIntentos) {
    intentos++;
    const { nombre, apellido } = await getRandomNameMultiAPI();
    let combo = '';
    
    switch(parseInt(tipo)) {
      case 1:
        const num1 = Math.floor(Math.random() * (2050 - 1996 + 1)) + 1996;
        const nombreBase1 = aplicarFormato(nombre, params.formatUser);
        const nombreBasePass1 = aplicarFormato(nombre, params.formatPass);
        let usuario1, contrasena1;
        if (params.userCombo === '1') usuario1 = `${nombreBase1}${num1}`;
        else if (params.userCombo === '2') usuario1 = `${num1}${nombreBase1}`;
        else usuario1 = Math.random() > 0.5 ? `${nombreBase1}${num1}` : `${num1}${nombreBase1}`;
        if (params.passCombo === '1') contrasena1 = `${nombreBasePass1}${num1}`;
        else if (params.passCombo === '2') contrasena1 = `${num1}${nombreBasePass1}`;
        else contrasena1 = Math.random() > 0.5 ? `${nombreBasePass1}${num1}` : `${num1}${nombreBasePass1}`;
        combo = `${usuario1}:${contrasena1}`;
        break;
      case 2:
        const nombreUsuario = aplicarFormato(nombre, params.formatUser);
        let nombrePassword;
        if (params.formatoCombo === '1') nombrePassword = aplicarFormato(nombre, params.formatPass);
        else if (params.formatoCombo === '2') nombrePassword = aplicarFormato(apellido, params.formatPass);
        else nombrePassword = Math.random() > 0.5 ? aplicarFormato(nombre, params.formatPass) : aplicarFormato(apellido, params.formatPass);
        combo = `${nombreUsuario}:${nombrePassword}`;
        break;
      case 3:
        const num3 = Math.floor(Math.random() * 999) + 1;
        const nombreBase3 = aplicarFormato(nombre, params.formatUser);
        const nombreBasePass3 = aplicarFormato(nombre, params.formatPass);
        let usuario3, contrasena3;
        if (params.userCombo === '1') usuario3 = `${nombreBase3}${num3}`;
        else if (params.userCombo === '2') usuario3 = `${num3}${nombreBase3}`;
        else usuario3 = Math.random() > 0.5 ? `${nombreBase3}${num3}` : `${num3}${nombreBase3}`;
        if (params.passCombo === '1') contrasena3 = `${nombreBasePass3}${num3}`;
        else if (params.passCombo === '2') contrasena3 = `${num3}${nombreBasePass3}`;
        else contrasena3 = Math.random() > 0.5 ? `${nombreBasePass3}${num3}` : `${num3}${nombreBasePass3}`;
        combo = `${usuario3}:${contrasena3}`;
        break;
      case 5:
        let tipoAlfa = params.tipoAlfa === '1' ? 'letras' : (params.tipoAlfa === '2' ? 'letras_numeros' : 'letras');
        let caseType = params.caseType === '1' ? 'mayusculas' : (params.caseType === '2' ? 'minusculas' : 'ambas');
        let username5 = randomAlphanumeric(params.userLen, tipoAlfa, caseType);
        let password5 = randomAlphanumeric(params.passLen, tipoAlfa, caseType);
        if (params.tipoAlfa === '3') {
          const year = Math.floor(Math.random() * (2020 - 1900 + 1)) + 1900;
          if (params.yearPos === 'left') username5 = username5 + year;
          else if (params.yearPos === 'right') password5 = password5 + year;
          else { username5 = username5 + year; password5 = password5 + year; }
        }
        combo = `${username5}:${password5}`;
        break;
      case 6:
        const numsSec = ['123', '1234', '12345', '123456', '1234567', '12345678', '123456789'];
        const num6 = numsSec[Math.floor(Math.random() * numsSec.length)];
        const nombreBase6 = aplicarFormato(nombre, '1');
        let usuario6;
        if (params.userCombo === '1') usuario6 = `${nombreBase6}${num6}`;
        else if (params.userCombo === '2') usuario6 = `${num6}${nombreBase6}`;
        else usuario6 = Math.random() > 0.5 ? `${nombreBase6}${num6}` : `${num6}${nombreBase6}`;
        combo = `${usuario6}:${usuario6}`;
        break;
      case 7:
        const num7 = Math.floor(Math.random() * 9999999) + 1;
        const nombreBase7 = aplicarFormato(nombre, '1');
        let usuario7;
        if (params.userCombo === '1') usuario7 = `${nombreBase7}${num7}`;
        else if (params.userCombo === '2') usuario7 = `${num7}${nombreBase7}`;
        else usuario7 = Math.random() > 0.5 ? `${nombreBase7}${num7}` : `${num7}${nombreBase7}`;
        combo = `${usuario7}:${usuario7}`;
        break;
      case 8:
        let userNum = '', passNum = '';
        for (let j = 0; j < params.userLen; j++) userNum += Math.floor(Math.random() * 10);
        if (params.tipoPass === '1') {
          const base = '123456789';
          const veces = Math.ceil(params.passLen / 9);
          passNum = (base.repeat(veces)).substring(0, params.passLen);
        } else if (params.tipoPass === '2') {
          for (let j = 0; j < params.passLen; j++) passNum += Math.floor(Math.random() * 10);
        } else {
          if (Math.random() > 0.5) {
            const base = '123456789';
            const veces = Math.ceil(params.passLen / 9);
            passNum = (base.repeat(veces)).substring(0, params.passLen);
          } else {
            for (let j = 0; j < params.passLen; j++) passNum += Math.floor(Math.random() * 10);
          }
        }
        combo = `${userNum}:${passNum}`;
        break;
      case 9:
        const nombreFormateado = aplicarFormato(nombre, params.formatUser);
        let numUsuario;
        if (params.tipoNumUser === '1') numUsuario = Math.floor(Math.random() * 999) + 1;
        else if (params.tipoNumUser === '2') numUsuario = Math.floor(Math.random() * (2028 - 2022 + 1)) + 2022;
        else numUsuario = Math.random() > 0.5 ? (Math.floor(Math.random() * 999) + 1) : (Math.floor(Math.random() * (2028 - 2022 + 1)) + 2022);
        let tipoPass = params.tipoPass === '1' ? 'letras' : (params.tipoPass === '2' ? 'letras_numeros' : 'letras');
        let passAlfa = randomAlphanumeric(params.passLen, tipoPass, 'ambas');
        if (params.tipoPass === '3') {
          const year = Math.floor(Math.random() * (2020 - 1900 + 1)) + 1900;
          if (Math.random() > 0.5) passAlfa = passAlfa + year;
          else passAlfa = year + passAlfa;
        }
        combo = `${nombreFormateado}${numUsuario}:${passAlfa}`;
        break;
    }
    
    if (!combosSet.has(combo)) {
      combosSet.add(combo);
      combosArray.push(combo);
      if (progressCallback) progressCallback(combosSet.size, cantidad);
    }
    if (delayGeneracion > 0) await new Promise(r => setTimeout(r, delayGeneracion));
  }
  return combosArray;
}

function downloadFile(content, filename) {
  const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
  const link = document.createElement('a');
  const url = URL.createObjectURL(blob);
  link.href = url;
  link.download = filename.endsWith('.txt') ? filename : filename + '.txt';
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
}

function mostrarMensaje(divId, texto, esError = false) {
  const div = document.getElementById(divId);
  div.classList.add('visible');
  div.innerHTML = `<div style="color: ${esError ? '#ff6b6b' : '#00ff88'}">${texto}</div>`;
  setTimeout(() => {
    div.classList.remove('visible');
  }, 4000);
}

function mostrarProgreso(actual, total) {
  const progressContainer = document.getElementById('progressContainer');
  const progressFill = document.getElementById('progressFill');
  const progressText = document.getElementById('progressText');
  const progressStats = document.getElementById('progressStats');
  progressContainer.classList.add('visible');
  const porcentaje = (actual / total) * 100;
  progressFill.style.width = `${porcentaje}%`;
  progressText.innerHTML = `🚀 Generando: ${actual} de ${total} combos (${Math.round(porcentaje)}%)`;
  progressStats.innerHTML = `⚡ Velocidad: ${delayGeneracion}ms por combo | ✅ Únicos: ${actual} | 🎯 Meta: ${total}`;
}

function ocultarProgreso() {
  const progressContainer = document.getElementById('progressContainer');
  progressContainer.classList.remove('visible');
}

// ============= GENERAR Y GUARDAR =============
async function generarYGuardar(tipo, config) {
  const nombreArchivo = config.nombreArchivo || `combos_tipo_${tipo}`;
  const cantidad = config.cantidad;
  const btnDescargar = document.getElementById('btnDescargarGenerador');
  
  btnDescargar.disabled = true;
  btnDescargar.textContent = '⏳ Generando...';
  
  mostrarMensaje('resultadoGen', `🚀 Generando ${cantidad} combos...`);
  
  ultimosCombosGenerados = await generarCombos(tipo, cantidad, config, mostrarProgreso);
  
  ocultarProgreso();
  
  if (ultimosCombosGenerados.length > 0) {
    btnDescargar.disabled = false;
    btnDescargar.textContent = '💾 Descargar Combos Generados';
    mostrarMensaje('resultadoGen', `✅ ${ultimosCombosGenerados.length} combos únicos generados.\n🎯 Duplicados evitados: ${cantidad - ultimosCombosGenerados.length}\n📁 Presiona "Descargar" para guardar el archivo.`);
  } else {
    btnDescargar.textContent = '💾 Descargar Combos Generados';
    mostrarMensaje('resultadoGen', `❌ Error al generar los combos`, true);
  }
}

document.getElementById('btnDescargarGenerador').onclick = () => {
  if (ultimosCombosGenerados.length > 0) {
    const panelActivo = document.querySelector('.panel-combos.active');
    let nombreArchivo = 'combos_generados';
    if (panelActivo) {
      const inputNombre = panelActivo.querySelector('input[type="text"]');
      if (inputNombre) nombreArchivo = inputNombre.value;
    }
    downloadFile(ultimosCombosGenerados.join('\n'), nombreArchivo);
    mostrarMensaje('resultadoGen', `💾 Archivo "${nombreArchivo}.txt" descargado con ${ultimosCombosGenerados.length} combos.`);
  } else {
    mostrarMensaje('resultadoGen', `⚠️ No hay combos generados. Primero genera los combos.`, true);
  }
};

function mostrarArchivosSeleccionados(input, containerId) {
  const container = document.getElementById(containerId);

  if (input.files.length === 0) {
    container.innerHTML = '<div style="color:#87ceeb; text-align:center;">No hay archivos seleccionados</div>';
    return;
  }
  Array.from(input.files).forEach((file, idx) => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.innerHTML = `<input type="checkbox" checked data-index="${idx}"><label>📄 ${file.name} (${(file.size/1024).toFixed(2)} KB)</label>`;
    container.appendChild(div);
  });
}

document.getElementById('btnProcesarUnir').onclick = async () => {
  const input = document.getElementById('unirFileInput');
  const resultadoDiv = document.getElementById('unirResultado');
  const btnDescargar = document.getElementById('btnDescargarUnir');
  
  if (input.files.length === 0) {
    mostrarMensaje('unirResultado', '❌ Selecciona al menos un archivo', true);
    return;
  }
  
  resultadoDiv.classList.add('visible');
  resultadoDiv.innerHTML = '<div style="color:#00ff88;">🔄 Leyendo archivos...</div>';
  btnDescargar.disabled = true;
  
  let todasLasLineas = [];
  let archivosProcesados = 0;
  
  for (const file of input.files) {
    try {
      const texto = await file.text();
      const lineas = texto.split(/\r?\n/).filter(l => l.trim() !== '');
      todasLasLineas.push(...lineas);
      archivosProcesados++;
      resultadoDiv.innerHTML = `<div style="color:#00ff88;">📖 Procesados ${archivosProcesados}/${input.files.length} archivos...</div>`;
    } catch(e) {
      resultadoDiv.innerHTML = `<div style="color:#ff6b6b;">❌ Error leyendo ${file.name}</div>`;
    }
  }
  
  const originales = todasLasLineas.length;
  ultimoResultadoUnion = [...new Set(todasLasLineas)];
  const duplicados = originales - ultimoResultadoUnion.length;
  
  resultadoDiv.innerHTML = `
    <div style="color:#00ff88;">
      ✅ Procesado correctamente<br>
      📊 Archivos procesados: ${archivosProcesados}<br>
      📝 Líneas originales: ${originales}<br>
      🎯 Líneas únicas: ${ultimoResultadoUnion.length}<br>
      🗑️ Duplicados eliminados: ${duplicados}<br>

  btnDescargar.disabled = false;
};
